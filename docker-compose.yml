version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: my_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: IdentityDb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - movieapp-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d IdentityDb"]
      interval: 10s
      retries: 5  

volumes:
  postgres_data:

networks:
  movieapp-network:
    external: true