mame: Build & Push Docker Images to Docker Hub

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
  
    steps:
      - uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
        
      - name: Build and Push Identity Service
        uses: docker/build-push-action@v4
        with:
          context: ./src/IdentityService
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/movieapp-identity:latest

      - name: Build and Push Movie Service
        uses: docker/build-push-action@v4
        with:
          context: ./src/MovieService
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/movieapp-movie:latest
      
      - name: Build and Push Rating Service
        uses: docker/build-push-action@v4
        with:
          context: ./src/RatingService
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/movieapp-rating:latest

      - name: Build and Push Frontend
        uses: docker/build-push-action@v4
        with: 
          context: ./frontend/web-app
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/movieapp-frontend:latest