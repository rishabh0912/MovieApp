name: Build & Push Docker Images to Docker Hub

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
  
    steps:
      - uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
        
      - name: Build and Push Identity Service
        uses: docker/build-push-action@v4
        with:
          context: ./src/IdentityService
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ secrets.DOCKER_USERNAME }}/movieapp-identity:latest

      - name: Build and Push Movie Service
        uses: docker/build-push-action@v4
        with:
          context: ./src/MovieService
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ secrets.DOCKER_USERNAME }}/movieapp-movie:latest
      
      - name: Build and Push Rating Service
        uses: docker/build-push-action@v4
        with:
          context: ./src/RatingService
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ secrets.DOCKER_USERNAME }}/movieapp-rating:latest

      - name: Build and Push Frontend
        uses: docker/build-push-action@v4
        with: 
          context: ./frontend/web-app
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ secrets.DOCKER_USERNAME }}/movieapp-frontend:latest
          build-args: |
            NEXT_PUBLIC_IDENTITY_URL=http://${{ secrets.EC2_HOST }}:5001
            NEXT_PUBLIC_MOVIE_URL=http://${{ secrets.EC2_HOST }}:5002
            NEXT_PUBLIC_RATING_URL=http://${{ secrets.EC2_HOST }}:5003

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v3

      - name: Copy compose files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.yml,docker-compose.services.yml"
          target: ~/movieapp

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            export EC2_HOST=${{ secrets.EC2_HOST }}
            cd ~/movieapp
            docker pull ${{ secrets.DOCKER_USERNAME }}/movieapp-identity:latest
            docker pull ${{ secrets.DOCKER_USERNAME }}/movieapp-movie:latest
            docker pull ${{ secrets.DOCKER_USERNAME }}/movieapp-rating:latest
            docker pull ${{ secrets.DOCKER_USERNAME }}/movieapp-frontend:latest
            docker-compose -f docker-compose.yml -f docker-compose.services.yml down
            docker-compose -f docker-compose.yml -f docker-compose.services.yml up -d
            docker image prune -f